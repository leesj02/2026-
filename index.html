<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이동수업 알리미</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --accent: #4f8ef7;
    --accent2: #7c5cfc;
    --warn: #f97316;
    --green: #22c55e;
    --text: #e2e8f0;
    --muted: #64748b;
    --border: #1e2d45;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px 80px;
  }

  .header {
    text-align: center;
    padding: 28px 0 24px;
  }

  .header h1 {
    font-size: 26px;
    font-weight: 900;
  }

  .now-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 20px;
  }

  .now-time {
    font-family: 'Space Mono', monospace;
    font-size: 40px;
    font-weight: 700;
  }

  .now-day {
    font-size: 14px;
    color: var(--muted);
  }

  .notif-btn{
    width:100%;
    padding:12px;
    margin-bottom:20px;
    border-radius:12px;
    border:1px dashed var(--border);
    background:transparent;
    color:var(--muted);
    cursor:pointer;
  }

</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>이동수업 알리미 🔔</h1>
</div>

<button class="notif-btn" id="notifBtn" onclick="requestNotification()">
🔔 브라우저 알림 허용하기
</button>

<div class="now-card">
<div class="now-time" id="nowTime">--:--:--</div>
<div class="now-day" id="nowDay">--요일</div>

<div style="margin-top:15px">
<span id="periodBadge">-</span>
<div id="currentSubject">-</div>
<div id="currentRoom">-</div>
</div>
</div>

</div>

<script>

const TIMETABLE={
1:[
{subject:'영어1',room:null,move:false},
{subject:'미디어 영어',room:'2-9반',move:true},
{subject:'사회와 문화',room:'2-4반',move:true},
{subject:'문학',room:null,move:false},
{subject:'인공지능 기초',room:'컴퓨터실',move:true},
{subject:'대수',room:null,move:false},
{subject:'미적1',room:null,move:false}
],

2:[
{subject:null},
{subject:null},
{subject:'화학',room:'2-3반',move:true},
{subject:'물리학',room:'2-2반',move:false},
{subject:'스문',room:null,move:false},
{subject:'대수',room:null,move:false},
{subject:'미디어 영어',room:'2-9반',move:true}
]
}

const PERIODS=[
[8,30,9,20],
[9,30,10,20],
[10,30,11,20],
[11,30,12,20],
[13,40,14,30],
[14,40,15,30],
[15,40,16,30]
]

const DAY_NAMES=['일','월','화','수','목','금','토']

let notifGranted=false

function requestNotification(){

if(!('Notification' in window)){
alert('이 브라우저는 알림을 지원하지 않습니다')
return
}

Notification.requestPermission().then(perm=>{

const btn=document.getElementById('notifBtn')

if(perm==='granted'){
notifGranted=true
btn.textContent='✅ 알림 허용됨'
}else{
btn.textContent='❌ 알림 거부됨'
}

})

}

function toMinutes(h,m){
return h*60+m
}

function getCurrentPeriod(h,m){

const now=toMinutes(h,m)

for(let i=0;i<PERIODS.length;i++){

const p=PERIODS[i]

const start=toMinutes(p[0],p[1])
const end=toMinutes(p[2],p[3])

if(now>=start && now<=end){
return i
}

}

return -1
}

function tick(){

const now=new Date()

const h=now.getHours()
const m=now.getMinutes()
const s=now.getSeconds()
const day=now.getDay()

document.getElementById('nowTime').textContent=
String(h).padStart(2,'0')+":"+
String(m).padStart(2,'0')+":"+
String(s).padStart(2,'0')

document.getElementById('nowDay').textContent=
DAY_NAMES[day]+"요일"

const period=getCurrentPeriod(h,m)

const tt=TIMETABLE[day]

if(period>=0 && tt && tt[period] && tt[period].subject){

const item=tt[period]

document.getElementById('periodBadge').textContent=(period+1)+"교시"
document.getElementById('currentSubject').textContent=item.subject

if(item.move){
document.getElementById('currentRoom').textContent="📍 "+item.room
}else{
document.getElementById('currentRoom').textContent="📍 본인 교실"
}

}else{

document.getElementById('periodBadge').textContent="-"
document.getElementById('currentSubject').textContent="수업 없음"
document.getElementById('currentRoom').textContent=""

}

}

window.onload=function(){

const btn=document.getElementById('notifBtn')

if('Notification' in window){

if(Notification.permission==='granted'){
notifGranted=true
btn.textContent='✅ 알림 허용됨'
}

}else{

btn.style.display="none"

}

tick()
setInterval(tick,1000)

}

</script>

</body>
</html>
